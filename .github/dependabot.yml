version: 2

updates:
  # GitHub Actions — checks workflow YAML for newer action versions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/New_York"
    # Supply-chain safety: wait N days after a release before opening a PR.
    # Fresh releases are the window in which malicious versions (tag-hijacks,
    # compromised maintainer accounts, typo-squats) typically get caught and
    # yanked. 3–7 days is generally enough to dodge the worst of it. Larger
    # version jumps wait longer so major rewrites have time to surface bugs.
    cooldown:
      default-days: 5
      semver-major-days: 14
      semver-minor-days: 7
      semver-patch-days: 3

  # Python — all dependency groups in a single uv.lock
  #
  # This project migrated from three pip-compile lock files (dev/test/lambda)
  # to a single uv.lock that covers every group in pyproject.toml, with
  # `[tool.uv.conflicts]` declaring the `lambda` and `cdk` groups as mutually
  # exclusive. Dependabot's uv ecosystem updates pyproject.toml + uv.lock
  # together, so one entry here covers every group at once.
  #
  # Grouped updates collapse the weekly PR volume from one-per-package to
  # one-per-group. Each group regenerates the lock as a single atomic update,
  # which prevents the cross-package version skew that hits
  # boto3/botocore/aws-lambda-powertools when they are bumped individually.
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/New_York"
    cooldown:
      default-days: 5
      semver-major-days: 14
      semver-minor-days: 7
      semver-patch-days: 3
    groups:
      aws-cdk:
        patterns:
          - "aws-cdk*"
          - "cdk-*"
          - "constructs"
      aws:
        patterns:
          - "aws-*"
          - "boto*"
          - "botocore*"
          - "s3transfer"
      pytest:
        patterns:
          - "pytest"
          - "pytest-*"
      docs:
        patterns:
          - "zensical"
          - "mkdocstrings"
          - "mkdocstrings-*"
      linting:
        patterns:
          - "ruff"
          - "mypy"
          - "pylint"
          - "bandit"
          - "pip-audit"
          - "pre-commit"
          - "radon"
          - "xenon"
      patches:
        update-types:
          - "patch"

  # pre-commit hooks — tracks the `rev:` field in .pre-commit-config.yaml
  # for each remote hook (ruff-pre-commit, bandit, pre-commit-hooks).
  # The mypy hook is intentionally configured as a local language:system
  # hook in .pre-commit-config.yaml so its dependencies (boto3-stubs,
  # aws-cdk-lib) come from the venv pyproject.toml manages — Dependabot's
  # pre-commit ecosystem only updates `rev:` lines, not the
  # `additional_dependencies` list, so any pinned dep there would drift
  # silently from the canonical pyproject.toml pins.
  - package-ecosystem: "pre-commit"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/New_York"
    cooldown:
      default-days: 5
      semver-major-days: 14
      semver-minor-days: 7
      semver-patch-days: 3
